<!DOCTYPE html>

<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Concerta Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

html {
background-color: #0a0a0f;
color-scheme: dark;
}

body {
font-family: ‘DM Sans’, sans-serif;
background-color: #0a0a0f;
color: #e8e8ef;
min-height: 100vh;
min-height: 100dvh;
-webkit-tap-highlight-color: transparent;
-webkit-text-size-adjust: 100%;
}

.app {
max-width: 480px;
margin: 0 auto;
padding: 16px;
padding-bottom: 120px;
}

/* ── Header ── */
.header {
display: flex;
align-items: center;
justify-content: space-between;
padding: 12px 0 20px;
}

.header h1 {
font-size: 20px;
font-weight: 700;
letter-spacing: -0.5px;
background: linear-gradient(135deg, #6c8cff, #a78bfa);
-webkit-background-clip: text;
background-clip: text;
-webkit-text-fill-color: transparent;
}

.header-actions { display: flex; gap: 8px; }

.icon-btn {
width: 36px; height: 36px;
border-radius: 8px;
border: 1px solid #2a2a3a;
background-color: #12121a;
color: #8888a0;
display: flex; align-items: center; justify-content: center;
cursor: pointer; transition: all 0.2s; font-size: 16px;
}
.icon-btn:active { border-color: #6c8cff; color: #6c8cff; }

/* ── Nav ── */
.nav {
display: flex;
background-color: #12121a;
border-radius: 12px;
padding: 4px;
margin-bottom: 20px;
border: 1px solid #2a2a3a;
}

.nav-btn {
flex: 1; padding: 10px 8px;
border: none; background-color: transparent;
color: #8888a0; font-family: inherit;
font-size: 13px; font-weight: 500;
border-radius: 8px; cursor: pointer;
transition: all 0.2s;
}

.nav-btn.active {
background-color: #6c8cff; color: #fff;
box-shadow: 0 2px 12px rgba(108,140,255,0.3);
}

/* ── Sections ── */
.section { display: none; }
.section.active { display: block; }

/* ── Form cards ── */
.form-card {
background-color: #12121a;
border: 1px solid #2a2a3a;
border-radius: 12px;
padding: 20px;
margin-bottom: 12px;
}

.form-card-title {
font-size: 11px; font-weight: 600;
text-transform: uppercase; letter-spacing: 1.5px;
color: #555568; margin-bottom: 16px;
}

.field { margin-bottom: 16px; }
.field:last-child { margin-bottom: 0; }

.field > label {
display: block; font-size: 13px; font-weight: 500;
color: #8888a0; margin-bottom: 8px;
}

/* ── Scale buttons (1-5) ── */
.scale { display: flex; gap: 6px; }

.scale-btn {
flex: 1; height: 42px;
border-radius: 8px;
border: 1px solid #2a2a3a;
background-color: #1a1a25;
color: #8888a0;
font-family: ‘JetBrains Mono’, monospace;
font-size: 14px; font-weight: 500;
cursor: pointer; transition: all 0.15s;
-webkit-appearance: none;
appearance: none;
}
.scale-btn.s1 { border-color: #e05555 !important; color: #e05555 !important; background-color: rgba(224,85,85,0.12) !important; }
.scale-btn.s2 { border-color: #f0a030 !important; color: #f0a030 !important; background-color: rgba(240,160,48,0.12) !important; }
.scale-btn.s3 { border-color: #8888a0 !important; color: #8888a0 !important; background-color: rgba(136,136,160,0.12) !important; }
.scale-btn.s4 { border-color: #6c8cff !important; color: #6c8cff !important; background-color: rgba(108,140,255,0.12) !important; }
.scale-btn.s5 { border-color: #4ecb71 !important; color: #4ecb71 !important; background-color: rgba(78,203,113,0.12) !important; }

/* ── Toggle buttons ── */
.toggle-group { display: flex; gap: 6px; }

.toggle-btn {
flex: 1; height: 42px;
border-radius: 8px;
border: 1px solid #2a2a3a;
background-color: #1a1a25;
color: #8888a0;
font-family: inherit; font-size: 13px; font-weight: 500;
cursor: pointer; transition: all 0.15s;
-webkit-appearance: none;
appearance: none;
}
.toggle-btn.sel {
border-color: #6c8cff !important;
background-color: rgba(108,140,255,0.15) !important;
color: #6c8cff !important;
}

/* ── Inputs ── */
.input-row { display: flex; gap: 8px; align-items: center; }

input[type=“date”],
input[type=“number”],
input[type=“time”],
input[type=“text”],
input[type=“password”],
textarea {
background-color: #1a1a25;
border: 1px solid #2a2a3a;
border-radius: 8px;
color: #e8e8ef;
font-family: ‘JetBrains Mono’, monospace;
font-size: 14px;
padding: 10px 12px;
width: 100%;
outline: none;
transition: border-color 0.2s;
-webkit-appearance: none;
appearance: none;
color-scheme: dark;
}
input:focus, textarea:focus { border-color: #6c8cff; }
input[type=“number”] { width: 80px; text-align: center; }
input[type=“time”] { width: 110px; }
input[type=“date”] { width: 160px; }

.unit { font-size: 13px; color: #555568; white-space: nowrap; }

textarea {
height: 60px; resize: vertical;
font-family: ‘DM Sans’, sans-serif;
font-size: 13px;
}

/* ── Energy blocks ── */
.energy-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
.energy-block > label { font-size: 11px; color: #555568; margin-bottom: 4px; display: block; }
.energy-select { display: flex; flex-direction: column; gap: 4px; }

.energy-option {
padding: 6px 8px; border-radius: 6px;
border: 1px solid #2a2a3a;
background-color: #1a1a25;
color: #8888a0;
font-size: 11px; font-weight: 500;
cursor: pointer; text-align: center;
transition: all 0.15s;
-webkit-appearance: none;
appearance: none;
}
.energy-option.sel {
border-color: #6c8cff !important;
background-color: rgba(108,140,255,0.15) !important;
color: #6c8cff !important;
}

/* ── Submit ── */
.submit-btn {
width: 100%; padding: 14px;
border: none; border-radius: 12px;
background: linear-gradient(135deg, #6c8cff, #8b6cf0);
color: #fff; font-family: inherit;
font-size: 15px; font-weight: 600;
cursor: pointer; margin-top: 16px;
transition: all 0.2s;
box-shadow: 0 4px 20px rgba(108,140,255,0.25);
-webkit-appearance: none;
}
.submit-btn:active { transform: scale(0.98); }

/* ── Date display ── */
.date-bar {
display: flex; align-items: center; justify-content: center;
gap: 8px; padding: 8px; margin-bottom: 12px;
}
.date-bar .warn { font-size: 12px; color: #f0a030; }

/* ── Toast ── */
.toast {
position: fixed; bottom: 80px; left: 50%;
transform: translateX(-50%) translateY(20px);
background-color: #4ecb71; color: #0a0a0f;
padding: 12px 24px; border-radius: 12px;
font-size: 14px; font-weight: 600;
opacity: 0; transition: all 0.3s;
z-index: 100; pointer-events: none;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ── History ── */
.history-item {
background-color: #12121a;
border: 1px solid #2a2a3a;
border-radius: 12px;
padding: 14px 16px;
margin-bottom: 8px;
}

.history-top {
display: flex; justify-content: space-between; align-items: center;
margin-bottom: 6px;
}

.history-date { font-size: 13px; font-weight: 600; color: #e8e8ef; }

.history-edit {
font-size: 11px; color: #6c8cff;
background: none; border: 1px solid #6c8cff;
border-radius: 6px; padding: 3px 10px;
cursor: pointer; font-family: inherit; font-weight: 500;
-webkit-appearance: none;
}

.history-pills { display: flex; gap: 6px; flex-wrap: wrap; cursor: pointer; }

.pill {
font-size: 11px; padding: 3px 8px;
border-radius: 20px; font-weight: 500;
font-family: ‘JetBrains Mono’, monospace;
}
.pill-dose { background-color: rgba(108,140,255,0.15); color: #6c8cff; }
.pill-good { background-color: rgba(78,203,113,0.15); color: #4ecb71; }
.pill-mid  { background-color: rgba(136,136,160,0.15); color: #8888a0; }
.pill-bad  { background-color: rgba(224,85,85,0.15); color: #e05555; }

/* ── Charts ── */
.chart-container {
background-color: #12121a;
border: 1px solid #2a2a3a;
border-radius: 12px;
padding: 16px; margin-bottom: 12px;
}
.chart-title { font-size: 13px; font-weight: 600; color: #e8e8ef; margin-bottom: 12px; }
.chart-wrap { position: relative; height: 200px; }

.dose-compare { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.dose-card { background-color: #1a1a25; border-radius: 8px; padding: 12px; text-align: center; }
.dose-card .dl { font-size: 11px; color: #555568; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
.dose-card .dv { font-family: ‘JetBrains Mono’, monospace; font-size: 24px; font-weight: 700; color: #6c8cff; }
.dose-card .ds { font-size: 11px; color: #8888a0; margin-top: 4px; }

/* ── Settings ── */
.settings-section {
background-color: #12121a;
border: 1px solid #2a2a3a;
border-radius: 12px;
padding: 20px; margin-bottom: 12px;
}
.settings-section h3 { font-size: 14px; font-weight: 600; margin-bottom: 12px; }
.settings-row { display: flex; align-items: center; gap: 12px; margin-bottom: 8px; }
.settings-row > label { font-size: 13px; color: #8888a0; width: 70px; flex-shrink: 0; }

.btn-s {
padding: 10px 20px;
border: 1px solid #2a2a3a;
border-radius: 8px;
background-color: #1a1a25;
color: #e8e8ef;
font-family: inherit; font-size: 13px; font-weight: 500;
cursor: pointer; -webkit-appearance: none;
}
.btn-s:active { border-color: #6c8cff; color: #6c8cff; }

.btn-d {
padding: 10px 20px;
border: 1px solid #e05555;
border-radius: 8px;
background-color: rgba(224,85,85,0.1);
color: #e05555;
font-family: inherit; font-size: 13px; font-weight: 500;
cursor: pointer; -webkit-appearance: none;
}

.status-bar { font-size: 12px; color: #555568; padding: 8px 0; text-align: center; }
.status-bar.ok { color: #4ecb71; }
.status-bar.err { color: #e05555; }

.empty-state { text-align: center; padding: 40px 20px; color: #555568; }
.empty-state .ei { font-size: 40px; margin-bottom: 12px; opacity: 0.5; }
.empty-state p { font-size: 14px; line-height: 1.6; }

/* ── Modal ── */
.modal-overlay {
position: fixed; inset: 0;
background-color: rgba(0,0,0,0.7);
display: none; z-index: 200;
align-items: flex-end; justify-content: center;
}
.modal-overlay.show { display: flex; }

.modal {
background-color: #12121a;
border: 1px solid #2a2a3a;
border-radius: 12px 12px 0 0;
width: 100%; max-width: 480px;
max-height: 80vh; overflow-y: auto;
padding: 24px;
animation: slideUp 0.3s ease;
}
@keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

.modal h3 { font-size: 16px; font-weight: 600; margin-bottom: 16px; }
.modal-actions { display: flex; gap: 8px; margin-top: 16px; }

.no-data { padding: 20px; text-align: center; color: #555568; font-size: 13px; }

.corr-grid { display: grid; gap: 2px; font-size: 10px; }
.corr-cell {
display: flex; align-items: center; justify-content: center;
aspect-ratio: 1; border-radius: 4px;
font-family: ‘JetBrains Mono’, monospace; font-weight: 500;
}
.corr-label {
display: flex; align-items: center;
font-size: 10px; color: #8888a0;
padding: 2px 4px; overflow: hidden;
text-overflow: ellipsis; white-space: nowrap;
}
</style>

</head>

<script>
/* ═══════════ STATE ═══════════ */
var entries = [];
var gist = { token: '', id: '' };
var modalDate = null;
var charts = {};

/* ═══════════ INIT ═══════════ */
(function init() {
  try { var c = localStorage.getItem('ct_entries'); if (c) entries = JSON.parse(c); } catch(e){}
  try { var g = localStorage.getItem('ct_gist'); if (g) gist = JSON.parse(g); } catch(e){}

  document.getElementById('s-token').value = gist.token || '';
  document.getElementById('s-gistId').value = gist.id || '';
  document.getElementById('entryDate').value = dateKey(new Date());

  checkExists();
  bindButtons();
  updateStatus();

  if (gist.token && gist.id) syncGist();
})();

function bindButtons() {
  // Nav
  var navBtns = document.querySelectorAll('.nav-btn');
  for (var i = 0; i < navBtns.length; i++) {
    navBtns[i].addEventListener('click', function() { showSection(this.dataset.sec); });
  }

  // Scale buttons
  var scales = document.querySelectorAll('.scale');
  for (var i = 0; i < scales.length; i++) {
    var btns = scales[i].querySelectorAll('.scale-btn');
    for (var j = 0; j < btns.length; j++) {
      btns[j].addEventListener('click', function() {
        var siblings = this.parentElement.querySelectorAll('.scale-btn');
        for (var k = 0; k < siblings.length; k++) siblings[k].className = 'scale-btn';
        this.className = 'scale-btn s' + this.dataset.v;
      });
    }
  }

  // Toggle buttons
  var toggles = document.querySelectorAll('.toggle-group');
  for (var i = 0; i < toggles.length; i++) {
    var btns = toggles[i].querySelectorAll('.toggle-btn');
    for (var j = 0; j < btns.length; j++) {
      btns[j].addEventListener('click', function() {
        var siblings = this.parentElement.querySelectorAll('.toggle-btn');
        for (var k = 0; k < siblings.length; k++) siblings[k].className = 'toggle-btn';
        this.className = 'toggle-btn sel';
      });
    }
  }

  // Energy buttons
  var energies = document.querySelectorAll('.energy-select');
  for (var i = 0; i < energies.length; i++) {
    var btns = energies[i].querySelectorAll('.energy-option');
    for (var j = 0; j < btns.length; j++) {
      btns[j].addEventListener('click', function() {
        var siblings = this.parentElement.querySelectorAll('.energy-option');
        for (var k = 0; k < siblings.length; k++) siblings[k].className = 'energy-option';
        this.className = 'energy-option sel';
      });
    }
  }

  document.getElementById('entryDate').addEventListener('change', function() {
    checkExists();
    loadFormForDate(this.value);
  });

  document.getElementById('saveBtn').addEventListener('click', saveEntry);
  document.getElementById('btnSaveSettings').addEventListener('click', saveSettings);
  document.getElementById('btnTestConn').addEventListener('click', testConnection);
  document.getElementById('btnExport').addEventListener('click', exportJSON);
  document.getElementById('btnImport').addEventListener('click', importJSON);
  document.getElementById('btnClear').addEventListener('click', clearData);

  document.getElementById('modal').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
  });
  document.getElementById('btnModalClose').addEventListener('click', closeModal);
  document.getElementById('btnModalEdit').addEventListener('click', editFromModal);
  document.getElementById('btnModalDel').addEventListener('click', deleteEntry);
}

/* ═══════════ NAV ═══════════ */
function showSection(name) {
  var sections = document.querySelectorAll('.section');
  for (var i = 0; i < sections.length; i++) sections[i].classList.remove('active');
  var navBtns = document.querySelectorAll('.nav-btn');
  for (var i = 0; i < navBtns.length; i++) navBtns[i].classList.remove('active');
  document.getElementById('section-' + name).classList.add('active');
  var nb = document.querySelector('.nav-btn[data-sec="' + name + '"]');
  if (nb) nb.classList.add('active');
  if (name === 'history') renderHistory();
  if (name === 'charts') renderCharts();
}

/* ═══════════ FORM ═══════════ */
function gv(field) {
  // Check scale buttons (have s1-s5 class)
  var scaleEl = document.querySelector('[data-f="' + field + '"] .s1, [data-f="' + field + '"] .s2, [data-f="' + field + '"] .s3, [data-f="' + field + '"] .s4, [data-f="' + field + '"] .s5');
  if (scaleEl) return scaleEl.dataset.v;
  // Check toggle/energy buttons (have sel class)
  var selEl = document.querySelector('[data-f="' + field + '"] .sel');
  if (selEl) return selEl.dataset.v;
  return null;
}

function dateKey(d) { return d.toISOString().slice(0, 10); }

function checkExists() {
  var date = document.getElementById('entryDate').value;
  var exists = false;
  for (var i = 0; i < entries.length; i++) { if (entries[i].date === date) { exists = true; break; } }
  document.getElementById('entryExists').style.display = exists ? 'inline' : 'none';
}

function resetForm() {
  var sbs = document.querySelectorAll('.scale-btn');
  for (var i = 0; i < sbs.length; i++) sbs[i].className = 'scale-btn';
  var tbs = document.querySelectorAll('.toggle-btn');
  for (var i = 0; i < tbs.length; i++) tbs[i].className = 'toggle-btn';
  var eos = document.querySelectorAll('.energy-option');
  for (var i = 0; i < eos.length; i++) eos[i].className = 'energy-option';
  document.getElementById('f-dose').value = 18;
  document.getElementById('f-doseTime').value = '07:00';
  document.getElementById('f-firstMeal').value = '11:00';
  document.getElementById('f-heartRate').value = '';
  document.getElementById('f-note').value = '';
}

function loadFormForDate(date) {
  resetForm();
  var e = null;
  for (var i = 0; i < entries.length; i++) { if (entries[i].date === date) { e = entries[i]; break; } }
  if (!e) return;

  document.getElementById('f-dose').value = e.dose || 18;
  document.getElementById('f-doseTime').value = e.doseTime || '07:00';
  document.getElementById('f-firstMeal').value = e.firstMeal || '11:00';
  document.getElementById('f-heartRate').value = e.heartRate || '';
  document.getElementById('f-note').value = e.note || '';

  var scaleFields = ['initiation', 'focus', 'emotionalReactivity'];
  for (var i = 0; i < scaleFields.length; i++) {
    var f = scaleFields[i];
    if (e[f]) {
      var btn = document.querySelector('[data-f="' + f + '"] [data-v="' + e[f] + '"]');
      if (btn) btn.className = 'scale-btn s' + e[f];
    }
  }

  var toggleFields = ['hungerNoticed', 'tinnitus', 'rls', 'sleepOnset', 'nightWaking'];
  for (var i = 0; i < toggleFields.length; i++) {
    var f = toggleFields[i];
    if (e[f]) {
      var btn = document.querySelector('[data-f="' + f + '"] [data-v="' + e[f] + '"]');
      if (btn) btn.className = 'toggle-btn sel';
    }
  }

  var energyFields = ['energyMorning', 'energyAfternoon', 'energyEvening'];
  for (var i = 0; i < energyFields.length; i++) {
    var f = energyFields[i];
    if (e[f]) {
      var btn = document.querySelector('[data-f="' + f + '"] [data-v="' + e[f] + '"]');
      if (btn) btn.className = 'energy-option sel';
    }
  }
}

function saveEntry() {
  var entry = {
    date: document.getElementById('entryDate').value,
    timestamp: new Date().toISOString(),
    dose: parseInt(document.getElementById('f-dose').value) || 0,
    doseTime: document.getElementById('f-doseTime').value,
    initiation: parseInt(gv('initiation')) || null,
    focus: parseInt(gv('focus')) || null,
    emotionalReactivity: parseInt(gv('emotionalReactivity')) || null,
    hungerNoticed: gv('hungerNoticed'),
    firstMeal: document.getElementById('f-firstMeal').value,
    heartRate: parseInt(document.getElementById('f-heartRate').value) || null,
    tinnitus: gv('tinnitus'),
    rls: gv('rls'),
    energyMorning: gv('energyMorning'),
    energyAfternoon: gv('energyAfternoon'),
    energyEvening: gv('energyEvening'),
    sleepOnset: gv('sleepOnset'),
    nightWaking: gv('nightWaking'),
    note: document.getElementById('f-note').value.trim()
  };

  var idx = -1;
  for (var i = 0; i < entries.length; i++) { if (entries[i].date === entry.date) { idx = i; break; } }
  if (idx >= 0) entries[idx] = entry; else entries.push(entry);
  entries.sort(function(a, b) { return a.date.localeCompare(b.date); });
  saveLocal();
  saveToGist();
  checkExists();
  toast('Záznam uložen ✓');
}

/* ═══════════ STORAGE ═══════════ */
function saveLocal() { localStorage.setItem('ct_entries', JSON.stringify(entries)); }

function saveSettings() {
  gist.token = document.getElementById('s-token').value.trim();
  gist.id = document.getElementById('s-gistId').value.trim();
  localStorage.setItem('ct_gist', JSON.stringify(gist));
  toast('Nastavení uloženo');
  updateStatus();
}

/* ═══════════ GIST ═══════════ */
async function saveToGist() {
  if (!gist.token) return;
  var payload = { files: { 'concerta-data.json': { content: JSON.stringify(entries, null, 2) } } };
  try {
    if (gist.id) {
      await fetch('https://api.github.com/gists/' + gist.id, {
        method: 'PATCH',
        headers: { 'Authorization': 'token ' + gist.token, 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
    } else {
      payload.description = 'Concerta Tracker Data';
      payload.public = false;
      var res = await fetch('https://api.github.com/gists', {
        method: 'POST',
        headers: { 'Authorization': 'token ' + gist.token, 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
      var json = await res.json();
      gist.id = json.id;
      document.getElementById('s-gistId').value = json.id;
      localStorage.setItem('ct_gist', JSON.stringify(gist));
    }
    updateStatus('Synchronizováno', true);
  } catch (err) {
    console.error('Gist save:', err);
    updateStatus('Chyba sync', false);
  }
}

async function syncGist() {
  if (!gist.token || !gist.id) return;
  try {
    var res = await fetch('https://api.github.com/gists/' + gist.id, {
      headers: { 'Authorization': 'token ' + gist.token }
    });
    var json = await res.json();
    var content = json.files && json.files['concerta-data.json'] && json.files['concerta-data.json'].content;
    if (content) {
      var remote = JSON.parse(content);
      var merged = {};
      for (var i = 0; i < remote.length; i++) merged[remote[i].date] = remote[i];
      for (var i = 0; i < entries.length; i++) { if (!merged[entries[i].date]) merged[entries[i].date] = entries[i]; }
      entries = Object.values(merged).sort(function(a, b) { return a.date.localeCompare(b.date); });
      saveLocal();
      checkExists();
      updateStatus('Synchronizováno', true);
    }
  } catch (err) {
    console.error('Gist sync:', err);
    updateStatus('Chyba sync', false);
  }
}

async function testConnection() {
  var token = document.getElementById('s-token').value.trim();
  if (!token) { toast('Zadej token'); return; }
  try {
    var res = await fetch('https://api.github.com/user', {
      headers: { 'Authorization': 'token ' + token }
    });
    var json = await res.json();
    if (json.login) {
      toast('OK — ' + json.login);
      updateStatus('Připojeno: ' + json.login, true);
    } else {
      toast('Token nefunguje');
      updateStatus('Neplatný token', false);
    }
  } catch (err) {
    toast('Chyba spojení');
    updateStatus('Chyba spojení', false);
  }
}

function updateStatus(msg, ok) {
  var bar = document.getElementById('statusBar');
  if (msg) { bar.textContent = msg; bar.className = 'status-bar ' + (ok ? 'ok' : 'err'); }
  else if (gist.token && gist.id) { bar.textContent = 'Gist nakonfigurován'; bar.className = 'status-bar ok'; }
  else if (gist.token) { bar.textContent = 'Token zadán, Gist ID chybí'; bar.className = 'status-bar'; }
  else { bar.textContent = 'Offline — nastav Gist v ⚙'; bar.className = 'status-bar'; }
}

/* ═══════════ HISTORY ═══════════ */
function renderHistory() {
  var list = document.getElementById('historyList');
  if (!entries.length) {
    list.innerHTML = '<div class="empty-state"><div class="ei">📋</div><p>Zatím žádné záznamy</p></div>';
    return;
  }
  var html = '';
  for (var i = entries.length - 1; i >= 0; i--) {
    var e = entries[i];
    var d = new Date(e.date + 'T12:00:00');
    var ds = d.toLocaleDateString('cs-CZ', { weekday: 'short', day: 'numeric', month: 'short' });
    var pills = '';
    if (e.dose) pills += '<span class="pill pill-dose">' + e.dose + 'mg</span>';
    if (e.initiation) pills += '<span class="pill ' + pc(e.initiation) + '">Init ' + e.initiation + '</span>';
    if (e.focus) pills += '<span class="pill ' + pc(e.focus) + '">Focus ' + e.focus + '</span>';
    if (e.emotionalReactivity) pills += '<span class="pill ' + pc(e.emotionalReactivity) + '">Emo ' + e.emotionalReactivity + '</span>';
    if (e.heartRate) pills += '<span class="pill pill-dose">' + e.heartRate + 'bpm</span>';
    html += '<div class="history-item">' +
      '<div class="history-top">' +
        '<span class="history-date">' + ds + '</span>' +
        '<button class="history-edit" onclick="editEntry(\'' + e.date + '\')">✏ Edit</button>' +
      '</div>' +
      '<div class="history-pills" onclick="showDetail(\'' + e.date + '\')">' + pills + '</div>' +
    '</div>';
  }
  list.innerHTML = html;
}

function pc(v) { return v >= 4 ? 'pill-good' : v === 3 ? 'pill-mid' : 'pill-bad'; }

function editEntry(date) {
  document.getElementById('entryDate').value = date;
  loadFormForDate(date);
  checkExists();
  showSection('log');
  toast('Editace záznamu');
}

function showDetail(date) {
  modalDate = date;
  var e = null;
  for (var i = 0; i < entries.length; i++) { if (entries[i].date === date) { e = entries[i]; break; } }
  if (!e) return;
  var d = new Date(date + 'T12:00:00');
  document.getElementById('modalTitle').textContent = d.toLocaleDateString('cs-CZ', { weekday: 'long', day: 'numeric', month: 'long' });
  var el = { low: '⬇ Low', ok: '→ OK', good: '⬆ Good', crash: '💥 Crash' };
  var sl = { easy: 'Lehké', normal: 'Normální', hard: 'Těžké' };
  var wl = { none: 'Ne', once: '1×', multiple: 'Víckrát' };
  var cl = { better: '✓ Lepší', same: '= Stejný', worse: '✗ Horší' };
  var h = '<div style="display:grid;gap:6px;">';
  h += '<div class="pill pill-dose" style="display:inline-block;width:fit-content;">' + e.dose + 'mg v ' + e.doseTime + '</div>';
  h += mr('Iniciace', sb(e.initiation));
  h += mr('Focus', sb(e.focus));
  h += mr('Emo. reaktivita', sb(e.emotionalReactivity));
  h += mr('Hlad', e.hungerNoticed === 'yes' ? 'Ano' : 'Ne');
  h += mr('První jídlo', e.firstMeal || '—');
  h += mr('Tepová frekvence', e.heartRate ? e.heartRate + ' bpm' : '—');
  h += mr('Tinnitus', cl[e.tinnitus] || '—');
  h += mr('RLS', cl[e.rls] || '—');
  h += mr('Energie', (el[e.energyMorning]||'—') + ' → ' + (el[e.energyAfternoon]||'—') + ' → ' + (el[e.energyEvening]||'—'));
  h += mr('Usínání', sl[e.sleepOnset] || '—');
  h += mr('Noční probouzení', wl[e.nightWaking] || '—');
  if (e.note) h += mr('Poznámka', e.note);
  h += '</div>';
  document.getElementById('modalBody').innerHTML = h;
  document.getElementById('modal').classList.add('show');
}

function mr(l, v) {
  return '<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #2a2a3a;">' +
    '<span style="color:#8888a0;font-size:13px;">' + l + '</span>' +
    '<span style="font-size:13px;font-weight:500;">' + v + '</span></div>';
}

function sb(v) {
  if (!v) return '—';
  var c = ['','#e05555','#f0a030','#8888a0','#6c8cff','#4ecb71'];
  return '<span style="color:' + c[v] + ';font-family:JetBrains Mono,monospace;font-weight:600;">' + v + '/5</span>';
}

function closeModal() { document.getElementById('modal').classList.remove('show'); modalDate = null; }

function editFromModal() {
  if (!modalDate) return;
  closeModal();
  editEntry(modalDate);
}

function deleteEntry() {
  if (!modalDate || !confirm('Smazat tento záznam?')) return;
  entries = entries.filter(function(e) { return e.date !== modalDate; });
  saveLocal(); saveToGist(); closeModal(); renderHistory(); checkExists();
  toast('Smazáno');
}

/* ═══════════ CHARTS ═══════════ */
function renderCharts() {
  var containers = document.querySelectorAll('#section-charts .chart-container');
  if (entries.length < 2) {
    for (var i = 0; i < containers.length; i++) containers[i].style.display = 'none';
    var nd = document.getElementById('noDataMsg');
    if (!nd) {
      document.getElementById('section-charts').insertAdjacentHTML('afterbegin',
        '<div class="no-data" id="noDataMsg">Potřeba alespoň 2 záznamy pro grafy</div>');
    }
    return;
  }
  var nd = document.getElementById('noDataMsg');
  if (nd) nd.remove();
  for (var i = 0; i < containers.length; i++) containers[i].style.display = 'block';
  renderTrend(); renderHr(); renderEnergy(); renderDose(); renderCorr();
}

function renderTrend() {
  var ctx = document.getElementById('chartTrend');
  if (charts.trend) charts.trend.destroy();
  var r = entries.slice(-14);
  var lb = r.map(function(e) { return fmtDate(e.date); });
  charts.trend = new Chart(ctx, {
    type: 'line',
    data: { labels: lb, datasets: [
      mkds('Iniciace', r.map(function(e){return e.initiation;}), '#6c8cff'),
      mkds('Focus', r.map(function(e){return e.focus;}), '#4ecb71'),
      mkds('Emo. reaktivita', r.map(function(e){return e.emotionalReactivity;}), '#f0a030')
    ]},
    options: co(1, 5)
  });
}

function renderHr() {
  var wrap = document.getElementById('chartHrWrap');
  var r = entries.slice(-14);
  var hasHr = false;
  for (var i = 0; i < r.length; i++) { if (r[i].heartRate) { hasHr = true; break; } }
  if (!hasHr) { wrap.style.display = 'none'; return; }
  wrap.style.display = 'block';
  var ctx = document.getElementById('chartHr');
  if (charts.hr) charts.hr.destroy();
  charts.hr = new Chart(ctx, {
    type: 'line',
    data: { labels: r.map(function(e){return fmtDate(e.date);}), datasets: [
      { label: 'bpm', data: r.map(function(e){return e.heartRate;}), borderColor: '#e05555', backgroundColor: 'rgba(224,85,85,0.1)', tension: 0.3, fill: true, pointRadius: 4 }
    ]},
    options: co(50, 120)
  });
}

function renderEnergy() {
  var ctx = document.getElementById('chartEnergy');
  if (charts.energy) charts.energy.destroy();
  var em = { low: 1, ok: 2, good: 3, crash: 0 };
  var r = entries.slice(-14);
  var opts = co(0, 3);
  opts.scales.y.ticks.callback = function(v) { return ['Crash','Low','OK','Good'][v]||''; };
  charts.energy = new Chart(ctx, {
    type: 'bar',
    data: { labels: r.map(function(e){return fmtDate(e.date);}), datasets: [
      { label: 'Ráno', data: r.map(function(e){return em[e.energyMorning] !== undefined ? em[e.energyMorning] : null;}), backgroundColor: 'rgba(108,140,255,0.6)' },
      { label: 'Odpoledne', data: r.map(function(e){return em[e.energyAfternoon] !== undefined ? em[e.energyAfternoon] : null;}), backgroundColor: 'rgba(78,203,113,0.6)' },
      { label: 'Večer', data: r.map(function(e){return em[e.energyEvening] !== undefined ? em[e.energyEvening] : null;}), backgroundColor: 'rgba(168,139,250,0.6)' }
    ]},
    options: opts
  });
}

function renderDose() {
  var ctr = document.getElementById('doseCards');
  var ctx = document.getElementById('chartDose');
  if (charts.dose) charts.dose.destroy();
  var doseSet = {};
  for (var i = 0; i < entries.length; i++) { if (entries[i].dose > 0) doseSet[entries[i].dose] = true; }
  var doses = Object.keys(doseSet).map(Number).sort(function(a,b){return a-b;});
  if (doses.length < 1) { ctr.innerHTML = '<div class="no-data">Zatím jen jedna dávka</div>'; return; }
  var ms = ['initiation','focus','emotionalReactivity'];
  var ml = { initiation: 'Iniciace', focus: 'Focus', emotionalReactivity: 'Emo. reaktivita' };
  var cardsHtml = '';
  for (var di = 0; di < doses.length; di++) {
    var dose = doses[di];
    var de = entries.filter(function(e){return e.dose === dose;});
    var sum = 0;
    for (var mi = 0; mi < ms.length; mi++) {
      var vals = de.map(function(e){return e[ms[mi]];}).filter(function(v){return v != null;});
      sum += vals.length ? vals.reduce(function(a,b){return a+b;},0)/vals.length : 0;
    }
    var avg = sum / ms.length;
    cardsHtml += '<div class="dose-card"><div class="dl">' + dose + 'mg</div><div class="dv">' + avg.toFixed(1) + '</div><div class="ds">Ø skóre (' + de.length + ' dní)</div></div>';
  }
  ctr.innerHTML = cardsHtml;
  var cls = ['rgba(108,140,255,0.7)','rgba(78,203,113,0.7)','rgba(240,160,48,0.7)'];
  var datasets = [];
  for (var mi = 0; mi < ms.length; mi++) {
    var m = ms[mi];
    var data = [];
    for (var di = 0; di < doses.length; di++) {
      var v = entries.filter(function(e){return e.dose===doses[di];}).map(function(e){return e[m];}).filter(function(v){return v!=null;});
      data.push(v.length ? v.reduce(function(a,b){return a+b;},0)/v.length : null);
    }
    datasets.push({ label: ml[m], data: data, backgroundColor: cls[mi] });
  }
  charts.dose = new Chart(ctx, {
    type: 'bar',
    data: { labels: doses.map(function(d){return d+'mg';}), datasets: datasets },
    options: co(0, 5)
  });
}

function renderCorr() {
  var ctr = document.getElementById('corrMatrix');
  var ms = ['initiation','focus','emotionalReactivity','dose','heartRate'];
  var lb = ['Init','Focus','Emo','Dávka','Tep'];
  var hasEnough = true;
  for (var i = 0; i < ms.length; i++) {
    var cnt = 0;
    for (var j = 0; j < entries.length; j++) { if (entries[j][ms[i]] != null) cnt++; }
    if (cnt < 3) { hasEnough = false; break; }
  }
  if (!hasEnough) { ctr.innerHTML = '<div class="no-data">Potřeba víc dat pro korelace</div>'; return; }
  var n = ms.length;
  var h = '<div class="corr-grid" style="grid-template-columns:50px repeat(' + n + ',1fr);"><div></div>';
  for (var i = 0; i < n; i++) h += '<div class="corr-label" style="justify-content:center;">' + lb[i] + '</div>';
  for (var i = 0; i < n; i++) {
    h += '<div class="corr-label">' + lb[i] + '</div>';
    for (var j = 0; j < n; j++) {
      if (i === j) { h += '<div class="corr-cell" style="background:#22222f;color:#555568;">1.0</div>'; }
      else {
        var xi = entries.map(function(e){return e[ms[i]];}).filter(function(v){return v!=null;});
        var yi = entries.map(function(e){return e[ms[j]];}).filter(function(v){return v!=null;});
        var r = pearson(xi, yi);
        var c = r > 0.3 ? 'rgba(78,203,113,' + Math.abs(r) + ')' : r < -0.3 ? 'rgba(224,85,85,' + Math.abs(r) + ')' : 'rgba(136,136,160,' + Math.max(0.1,Math.abs(r)) + ')';
        h += '<div class="corr-cell" style="background:' + c + ';">' + r.toFixed(1) + '</div>';
      }
    }
  }
  h += '</div>';
  ctr.innerHTML = h;
}

/* ═══════════ CHART HELPERS ═══════════ */
function mkds(label, data, color) {
  return { label: label, data: data, borderColor: color, backgroundColor: color + '18', tension: 0.3, fill: false, pointRadius: 3 };
}

function co(min, max) {
  return {
    responsive: true, maintainAspectRatio: false,
    interaction: { mode: 'index', intersect: false },
    plugins: { legend: { position: 'bottom', labels: { color: '#8888a0', font: { family: 'DM Sans', size: 11 }, boxWidth: 12, padding: 12 }}},
    scales: {
      x: { ticks: { color: '#555568', font: { family: 'DM Sans', size: 10 }}, grid: { color: 'rgba(42,42,58,0.5)' }},
      y: { min: min, max: max, ticks: { color: '#555568', font: { family: 'JetBrains Mono', size: 10 }, stepSize: 1 }, grid: { color: 'rgba(42,42,58,0.5)' }}
    }
  };
}

function pearson(x, y) {
  var n = Math.min(x.length, y.length);
  if (n < 3) return 0;
  var ax = x.slice(0,n), ay = y.slice(0,n);
  var mx = 0, my = 0;
  for (var i = 0; i < n; i++) { mx += ax[i]; my += ay[i]; }
  mx /= n; my /= n;
  var num = 0, dx = 0, dy = 0;
  for (var i = 0; i < n; i++) {
    var xi = ax[i] - mx, yi = ay[i] - my;
    num += xi * yi; dx += xi * xi; dy += yi * yi;
  }
  var d = Math.sqrt(dx * dy);
  return d === 0 ? 0 : num / d;
}

function fmtDate(s) {
  var d = new Date(s + 'T12:00:00');
  return d.toLocaleDateString('cs-CZ', { day: 'numeric', month: 'numeric' });
}

/* ═══════════ EXPORT / IMPORT ═══════════ */
function exportJSON() {
  var b = new Blob([JSON.stringify(entries, null, 2)], { type: 'application/json' });
  var a = document.createElement('a');
  a.href = URL.createObjectURL(b);
  a.download = 'concerta-' + dateKey(new Date()) + '.json';
  a.click();
}

function importJSON() {
  var inp = document.createElement('input');
  inp.type = 'file'; inp.accept = '.json';
  inp.onchange = async function(ev) {
    var f = ev.target.files[0];
    if (!f) return;
    try {
      var imp = JSON.parse(await f.text());
      if (Array.isArray(imp)) {
        var m = {};
        for (var i = 0; i < entries.length; i++) m[entries[i].date] = entries[i];
        for (var i = 0; i < imp.length; i++) m[imp[i].date] = imp[i];
        entries = Object.values(m).sort(function(a,b){return a.date.localeCompare(b.date);});
        saveLocal(); saveToGist();
        toast('Import: ' + imp.length + ' záznamů');
      }
    } catch(e) { toast('Chyba importu'); }
  };
  inp.click();
}

function clearData() {
  if (!confirm('Opravdu smazat všechna data?')) return;
  if (!confirm('Fakt úplně všechno?')) return;
  entries = [];
  saveLocal(); saveToGist(); checkExists();
  toast('Data smazána');
}

/* ═══════════ UTILS ═══════════ */
function toast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(function() { t.classList.remove('show'); }, 2000);
}
