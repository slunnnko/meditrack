<!DOCTYPE html>

<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Concerta Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --surface-2: #1a1a25;
    --surface-3: #22222f;
    --border: #2a2a3a;
    --text: #e8e8ef;
    --text-dim: #8888a0;
    --text-muted: #555568;
    --accent: #6c8cff;
    --accent-dim: #4a6ad4;
    --accent-glow: rgba(108, 140, 255, 0.15);
    --good: #4ecb71;
    --warn: #f0a030;
    --bad: #e05555;
    --radius: 12px;
    --radius-sm: 8px;
  }

- { margin: 0; padding: 0; box-sizing: border-box; }

body {
font-family: ‘DM Sans’, sans-serif;
background: var(–bg);
color: var(–text);
min-height: 100vh;
-webkit-tap-highlight-color: transparent;
}

.app {
max-width: 480px;
margin: 0 auto;
padding: 16px;
padding-bottom: 100px;
}

/* Header */
.header {
display: flex;
align-items: center;
justify-content: space-between;
padding: 12px 0 20px;
}

.header h1 {
font-size: 20px;
font-weight: 700;
letter-spacing: -0.5px;
background: linear-gradient(135deg, var(–accent), #a78bfa);
-webkit-background-clip: text;
-webkit-text-fill-color: transparent;
}

.header-actions {
display: flex;
gap: 8px;
}

.icon-btn {
width: 36px;
height: 36px;
border-radius: var(–radius-sm);
border: 1px solid var(–border);
background: var(–surface);
color: var(–text-dim);
display: flex;
align-items: center;
justify-content: center;
cursor: pointer;
transition: all 0.2s;
font-size: 16px;
}

.icon-btn:hover { border-color: var(–accent); color: var(–accent); }

/* Navigation */
.nav {
display: flex;
background: var(–surface);
border-radius: var(–radius);
padding: 4px;
margin-bottom: 20px;
border: 1px solid var(–border);
}

.nav-btn {
flex: 1;
padding: 10px 8px;
border: none;
background: transparent;
color: var(–text-dim);
font-family: inherit;
font-size: 13px;
font-weight: 500;
border-radius: var(–radius-sm);
cursor: pointer;
transition: all 0.2s;
}

.nav-btn.active {
background: var(–accent);
color: white;
box-shadow: 0 2px 12px rgba(108, 140, 255, 0.3);
}

/* Sections */
.section { display: none; }
.section.active { display: block; }

/* Form */
.form-card {
background: var(–surface);
border: 1px solid var(–border);
border-radius: var(–radius);
padding: 20px;
margin-bottom: 12px;
}

.form-card-title {
font-size: 11px;
font-weight: 600;
text-transform: uppercase;
letter-spacing: 1.5px;
color: var(–text-muted);
margin-bottom: 16px;
}

.field {
margin-bottom: 16px;
}

.field:last-child { margin-bottom: 0; }

.field label {
display: block;
font-size: 13px;
font-weight: 500;
color: var(–text-dim);
margin-bottom: 8px;
}

/* Scale selector */
.scale {
display: flex;
gap: 6px;
}

.scale-btn {
flex: 1;
height: 42px;
border-radius: var(–radius-sm);
border: 1px solid var(–border);
background: var(–surface-2);
color: var(–text-dim);
font-family: ‘JetBrains Mono’, monospace;
font-size: 14px;
font-weight: 500;
cursor: pointer;
transition: all 0.2s;
}

.scale-btn:hover { border-color: var(–text-muted); }

.scale-btn.selected {
border-color: var(–accent);
background: var(–accent-glow);
color: var(–accent);
box-shadow: 0 0 12px rgba(108, 140, 255, 0.15);
}

.scale-btn.selected[data-value=“1”] { border-color: var(–bad); color: var(–bad); background: rgba(224, 85, 85, 0.1); }
.scale-btn.selected[data-value=“2”] { border-color: var(–warn); color: var(–warn); background: rgba(240, 160, 48, 0.1); }
.scale-btn.selected[data-value=“3”] { border-color: var(–text-dim); color: var(–text-dim); background: rgba(136, 136, 160, 0.1); }
.scale-btn.selected[data-value=“4”] { border-color: var(–accent); color: var(–accent); background: var(–accent-glow); }
.scale-btn.selected[data-value=“5”] { border-color: var(–good); color: var(–good); background: rgba(78, 203, 113, 0.1); }

/* Toggle */
.toggle-group {
display: flex;
gap: 6px;
}

.toggle-btn {
flex: 1;
height: 42px;
border-radius: var(–radius-sm);
border: 1px solid var(–border);
background: var(–surface-2);
color: var(–text-dim);
font-family: inherit;
font-size: 13px;
font-weight: 500;
cursor: pointer;
transition: all 0.2s;
}

.toggle-btn.selected {
border-color: var(–accent);
background: var(–accent-glow);
color: var(–accent);
}

/* Input fields */
.input-row {
display: flex;
gap: 8px;
align-items: center;
}

input[type=“date”], input[type=“number”], input[type=“time”], input[type=“text”], textarea {
background: var(–surface-2);
border: 1px solid var(–border);
border-radius: var(–radius-sm);
color: var(–text);
font-family: ‘JetBrains Mono’, monospace;
font-size: 14px;
padding: 10px 12px;
width: 100%;
outline: none;
transition: border-color 0.2s;
}

input:focus, textarea:focus {
border-color: var(–accent);
}

input[type=“number”] { width: 80px; text-align: center; }
input[type=“time”] { width: 100px; }
input[type=“date”] { width: 160px; }

.unit { font-size: 13px; color: var(–text-muted); }

textarea {
height: 60px;
resize: vertical;
font-family: ‘DM Sans’, sans-serif;
font-size: 13px;
}

/* Energy blocks */
.energy-row {
display: grid;
grid-template-columns: 1fr 1fr 1fr;
gap: 8px;
}

.energy-block label {
font-size: 11px;
color: var(–text-muted);
margin-bottom: 4px;
}

.energy-select {
display: flex;
flex-direction: column;
gap: 4px;
}

.energy-option {
padding: 6px 8px;
border-radius: 6px;
border: 1px solid var(–border);
background: var(–surface-2);
color: var(–text-dim);
font-size: 11px;
font-weight: 500;
cursor: pointer;
text-align: center;
transition: all 0.2s;
}

.energy-option.selected {
border-color: var(–accent);
background: var(–accent-glow);
color: var(–accent);
}

/* Submit */
.submit-btn {
width: 100%;
padding: 14px;
border: none;
border-radius: var(–radius);
background: linear-gradient(135deg, var(–accent), #8b6cf0);
color: white;
font-family: inherit;
font-size: 15px;
font-weight: 600;
cursor: pointer;
margin-top: 16px;
transition: all 0.2s;
box-shadow: 0 4px 20px rgba(108, 140, 255, 0.25);
}

.submit-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 24px rgba(108, 140, 255, 0.35); }
.submit-btn:active { transform: translateY(0); }
.submit-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

/* Date display */
.date-display {
text-align: center;
padding: 8px;
font-size: 13px;
color: var(–text-dim);
font-weight: 500;
margin-bottom: 12px;
}

.date-display strong {
color: var(–text);
}

/* Toast */
.toast {
position: fixed;
bottom: 80px;
left: 50%;
transform: translateX(-50%) translateY(20px);
background: var(–good);
color: #0a0a0f;
padding: 12px 24px;
border-radius: var(–radius);
font-size: 14px;
font-weight: 600;
opacity: 0;
transition: all 0.3s;
z-index: 100;
pointer-events: none;
}

.toast.show {
opacity: 1;
transform: translateX(-50%) translateY(0);
}

/* History */
.history-item {
background: var(–surface);
border: 1px solid var(–border);
border-radius: var(–radius);
padding: 14px 16px;
margin-bottom: 8px;
cursor: pointer;
transition: border-color 0.2s;
}

.history-item:hover { border-color: var(–accent-dim); }

.history-date {
font-size: 13px;
font-weight: 600;
color: var(–text);
margin-bottom: 6px;
}

.history-pills {
display: flex;
gap: 6px;
flex-wrap: wrap;
}

.pill {
font-size: 11px;
padding: 3px 8px;
border-radius: 20px;
font-weight: 500;
font-family: ‘JetBrains Mono’, monospace;
}

.pill-dose { background: rgba(108, 140, 255, 0.15); color: var(–accent); }
.pill-good { background: rgba(78, 203, 113, 0.15); color: var(–good); }
.pill-mid { background: rgba(136, 136, 160, 0.15); color: var(–text-dim); }
.pill-bad { background: rgba(224, 85, 85, 0.15); color: var(–bad); }

/* Charts */
.chart-container {
background: var(–surface);
border: 1px solid var(–border);
border-radius: var(–radius);
padding: 16px;
margin-bottom: 12px;
}

.chart-title {
font-size: 13px;
font-weight: 600;
color: var(–text);
margin-bottom: 12px;
}

.chart-wrap {
position: relative;
height: 200px;
}

/* Dose comparison */
.dose-compare {
display: grid;
grid-template-columns: 1fr 1fr;
gap: 8px;
}

.dose-card {
background: var(–surface-2);
border-radius: var(–radius-sm);
padding: 12px;
text-align: center;
}

.dose-card .dose-label {
font-size: 11px;
color: var(–text-muted);
text-transform: uppercase;
letter-spacing: 1px;
margin-bottom: 8px;
}

.dose-card .dose-value {
font-family: ‘JetBrains Mono’, monospace;
font-size: 24px;
font-weight: 700;
color: var(–accent);
}

.dose-card .dose-sub {
font-size: 11px;
color: var(–text-dim);
margin-top: 4px;
}

/* Settings */
.settings-section {
background: var(–surface);
border: 1px solid var(–border);
border-radius: var(–radius);
padding: 20px;
margin-bottom: 12px;
}

.settings-section h3 {
font-size: 14px;
font-weight: 600;
margin-bottom: 12px;
}

.settings-row {
display: flex;
align-items: center;
gap: 12px;
margin-bottom: 8px;
}

.settings-row label {
font-size: 13px;
color: var(–text-dim);
flex: 1;
}

.settings-row input {
width: 240px;
}

.btn-secondary {
padding: 10px 20px;
border: 1px solid var(–border);
border-radius: var(–radius-sm);
background: var(–surface-2);
color: var(–text);
font-family: inherit;
font-size: 13px;
font-weight: 500;
cursor: pointer;
transition: all 0.2s;
}

.btn-secondary:hover { border-color: var(–accent); color: var(–accent); }

.btn-danger {
padding: 10px 20px;
border: 1px solid var(–bad);
border-radius: var(–radius-sm);
background: rgba(224, 85, 85, 0.1);
color: var(–bad);
font-family: inherit;
font-size: 13px;
font-weight: 500;
cursor: pointer;
transition: all 0.2s;
}

.status-bar {
font-size: 12px;
color: var(–text-muted);
padding: 8px 0;
text-align: center;
}

.status-bar.connected { color: var(–good); }
.status-bar.error { color: var(–bad); }

/* Empty state */
.empty-state {
text-align: center;
padding: 40px 20px;
color: var(–text-muted);
}

.empty-state .empty-icon {
font-size: 40px;
margin-bottom: 12px;
opacity: 0.5;
}

.empty-state p {
font-size: 14px;
line-height: 1.6;
}

/* Modal */
.modal-overlay {
position: fixed;
inset: 0;
background: rgba(0,0,0,0.7);
display: none;
z-index: 200;
align-items: flex-end;
justify-content: center;
}

.modal-overlay.show { display: flex; }

.modal {
background: var(–surface);
border: 1px solid var(–border);
border-radius: var(–radius) var(–radius) 0 0;
width: 100%;
max-width: 480px;
max-height: 80vh;
overflow-y: auto;
padding: 24px;
animation: slideUp 0.3s ease;
}

@keyframes slideUp {
from { transform: translateY(100%); }
to { transform: translateY(0); }
}

.modal h3 {
font-size: 16px;
font-weight: 600;
margin-bottom: 16px;
}

.modal-actions {
display: flex;
gap: 8px;
margin-top: 16px;
}

.no-data {
padding: 20px;
text-align: center;
color: var(–text-muted);
font-size: 13px;
}

/* Correlation matrix */
.corr-grid {
display: grid;
gap: 2px;
font-size: 10px;
}

.corr-cell {
display: flex;
align-items: center;
justify-content: center;
aspect-ratio: 1;
border-radius: 4px;
font-family: ‘JetBrains Mono’, monospace;
font-weight: 500;
}

.corr-label {
display: flex;
align-items: center;
font-size: 10px;
color: var(–text-dim);
padding: 2px 4px;
overflow: hidden;
text-overflow: ellipsis;
white-space: nowrap;
}
</style>

</head>

<div id="detailModal" class="modal-overlay" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <h3 id="modalTitle"></h3>
    <div id="modalContent"></div>
    <div class="modal-actions">
      <button class="btn-secondary" onclick="closeModal()">Zavřít</button>
      <button class="btn-danger" onclick="deleteEntry()">Smazat</button>
    </div>
  </div>
</div>

<div id="toast" class="toast"></div>

<script>
// =================== STATE ===================
let entries = [];
let gistConfig = { token: '', gistId: '' };
let currentModalDate = null;
let charts = {};

// =================== INIT ===================
function init() {
  // Load from localStorage as cache
  const cached = localStorage.getItem('concerta_entries');
  if (cached) entries = JSON.parse(cached);

  const config = localStorage.getItem('concerta_gist');
  if (config) gistConfig = JSON.parse(config);

  document.getElementById('gistToken').value = gistConfig.token || '';
  document.getElementById('gistId').value = gistConfig.gistId || '';

  // Set today's date
  const today = new Date();
  document.getElementById('entryDate').value = getDateKey(today);

  // Check if entry exists for today
  checkTodayEntry();

  // Init scale/toggle buttons
  initButtons();

  // Sync from Gist if configured
  if (gistConfig.token && gistConfig.gistId) {
    syncGist();
  }

  updateStatus();
}

function initButtons() {
  document.querySelectorAll('.scale').forEach(scale => {
    scale.querySelectorAll('.scale-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        scale.querySelectorAll('.scale-btn').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
      });
    });
  });

  document.querySelectorAll('.toggle-group').forEach(group => {
    group.querySelectorAll('.toggle-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        group.querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
      });
    });
  });

  document.querySelectorAll('.energy-select').forEach(group => {
    group.querySelectorAll('.energy-option').forEach(btn => {
      btn.addEventListener('click', () => {
        group.querySelectorAll('.energy-option').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
      });
    });
  });
}

// =================== NAVIGATION ===================
function showSection(name) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));

  document.getElementById(`section-${name}`).classList.add('active');

  if (name === 'settings') {
    // No nav button for settings
  } else {
    document.querySelectorAll('.nav-btn').forEach(b => {
      if (b.textContent.toLowerCase().includes(
        name === 'log' ? 'záznam' : name === 'history' ? 'historie' : 'graf'
      )) b.classList.add('active');
    });
  }

  if (name === 'history') renderHistory();
  if (name === 'charts') renderCharts();
}

// =================== FORM ===================
function getFormValue(field) {
  const el = document.querySelector(`[data-field="${field}"] .selected`);
  return el ? el.dataset.value : null;
}

function getDateKey(d) {
  return d.toISOString().slice(0, 10);
}

function checkTodayEntry() {
  const selectedDate = document.getElementById('entryDate').value;
  const exists = entries.find(e => e.date === selectedDate);
  document.getElementById('entryExists').style.display = exists ? 'inline' : 'none';
}

function onDateChange() {
  checkTodayEntry();
  loadEntryForDate(document.getElementById('entryDate').value);
}

function loadEntryForDate(date) {
  const e = entries.find(x => x.date === date);

  // Reset all selections
  document.querySelectorAll('.scale-btn, .toggle-btn, .energy-option').forEach(b => b.classList.remove('selected'));
  document.getElementById('dose').value = 18;
  document.getElementById('doseTime').value = '07:00';
  document.getElementById('firstMeal').value = '11:00';
  document.getElementById('heartRate').value = '';
  document.getElementById('note').value = '';

  if (!e) return;

  // Populate form
  document.getElementById('dose').value = e.dose || 18;
  document.getElementById('doseTime').value = e.doseTime || '07:00';
  document.getElementById('firstMeal').value = e.firstMeal || '11:00';
  document.getElementById('heartRate').value = e.heartRate || '';
  document.getElementById('note').value = e.note || '';

  // Set scale buttons
  ['initiation', 'focus', 'emotionalReactivity'].forEach(field => {
    if (e[field]) {
      const btn = document.querySelector(`[data-field="${field}"] .scale-btn[data-value="${e[field]}"]`);
      if (btn) btn.classList.add('selected');
    }
  });

  // Set toggle buttons
  ['hungerNoticed', 'tinnitus', 'rls', 'sleepOnset', 'nightWaking'].forEach(field => {
    if (e[field]) {
      const btn = document.querySelector(`[data-field="${field}"] [data-value="${e[field]}"]`);
      if (btn) btn.classList.add('selected');
    }
  });

  // Set energy buttons
  ['energyMorning', 'energyAfternoon', 'energyEvening'].forEach(field => {
    if (e[field]) {
      const btn = document.querySelector(`[data-field="${field}"] [data-value="${e[field]}"]`);
      if (btn) btn.classList.add('selected');
    }
  });
}

function saveEntry() {
  const entry = {
    date: document.getElementById('entryDate').value,
    timestamp: new Date().toISOString(),
    dose: parseInt(document.getElementById('dose').value) || 0,
    doseTime: document.getElementById('doseTime').value,
    initiation: parseInt(getFormValue('initiation')) || null,
    focus: parseInt(getFormValue('focus')) || null,
    emotionalReactivity: parseInt(getFormValue('emotionalReactivity')) || null,
    hungerNoticed: getFormValue('hungerNoticed'),
    firstMeal: document.getElementById('firstMeal').value,
    heartRate: parseInt(document.getElementById('heartRate').value) || null,
    tinnitus: getFormValue('tinnitus'),
    rls: getFormValue('rls'),
    energyMorning: getFormValue('energyMorning'),
    energyAfternoon: getFormValue('energyAfternoon'),
    energyEvening: getFormValue('energyEvening'),
    sleepOnset: getFormValue('sleepOnset'),
    nightWaking: getFormValue('nightWaking'),
    note: document.getElementById('note').value.trim()
  };

  // Replace or add
  const idx = entries.findIndex(e => e.date === entry.date);
  if (idx >= 0) {
    entries[idx] = entry;
  } else {
    entries.push(entry);
  }

  entries.sort((a, b) => a.date.localeCompare(b.date));
  saveLocal();
  saveToGist();
  checkTodayEntry();
  showToast('Záznam uložen ✓');
}

// =================== STORAGE ===================
function saveLocal() {
  localStorage.setItem('concerta_entries', JSON.stringify(entries));
}

function saveSettings() {
  gistConfig.token = document.getElementById('gistToken').value.trim();
  gistConfig.gistId = document.getElementById('gistId').value.trim();
  localStorage.setItem('concerta_gist', JSON.stringify(gistConfig));
  showToast('Nastavení uloženo');
  updateStatus();
}

// =================== GIST API ===================
async function saveToGist() {
  if (!gistConfig.token) return;

  const data = {
    files: {
      'concerta-data.json': {
        content: JSON.stringify(entries, null, 2)
      }
    }
  };

  try {
    if (gistConfig.gistId) {
      await fetch(`https://api.github.com/gists/${gistConfig.gistId}`, {
        method: 'PATCH',
        headers: {
          'Authorization': `token ${gistConfig.token}`,
          'Content-Type': 'application/json'
        },
        body: JSON.stringify(data)
      });
    } else {
      data.description = 'Concerta Tracker Data';
      data.public = false;
      const res = await fetch('https://api.github.com/gists', {
        method: 'POST',
        headers: {
          'Authorization': `token ${gistConfig.token}`,
          'Content-Type': 'application/json'
        },
        body: JSON.stringify(data)
      });
      const json = await res.json();
      gistConfig.gistId = json.id;
      document.getElementById('gistId').value = json.id;
      localStorage.setItem('concerta_gist', JSON.stringify(gistConfig));
    }
    updateStatus('Synchronizováno', true);
  } catch (err) {
    console.error('Gist save error:', err);
    updateStatus('Chyba synchronizace', false);
  }
}

async function syncGist() {
  if (!gistConfig.token || !gistConfig.gistId) return;

  try {
    const res = await fetch(`https://api.github.com/gists/${gistConfig.gistId}`, {
      headers: { 'Authorization': `token ${gistConfig.token}` }
    });
    const json = await res.json();
    const content = json.files['concerta-data.json']?.content;
    if (content) {
      const remote = JSON.parse(content);
      // Merge: remote wins for same date, keep unique from both
      const merged = {};
      remote.forEach(e => merged[e.date] = e);
      entries.forEach(e => { if (!merged[e.date]) merged[e.date] = e; });
      entries = Object.values(merged).sort((a, b) => a.date.localeCompare(b.date));
      saveLocal();
      checkTodayEntry();
      updateStatus('Synchronizováno', true);
    }
  } catch (err) {
    console.error('Gist sync error:', err);
    updateStatus('Chyba synchronizace', false);
  }
}

async function testConnection() {
  const token = document.getElementById('gistToken').value.trim();
  if (!token) { showToast('Zadej token'); return; }

  try {
    const res = await fetch('https://api.github.com/user', {
      headers: { 'Authorization': `token ${token}` }
    });
    const json = await res.json();
    if (json.login) {
      showToast(`Spojení OK — ${json.login}`);
      updateStatus(`Připojeno jako ${json.login}`, true);
    } else {
      showToast('Token nefunguje');
      updateStatus('Token neplatný', false);
    }
  } catch (err) {
    showToast('Chyba spojení');
    updateStatus('Chyba spojení', false);
  }
}

function updateStatus(msg, ok) {
  const bar = document.getElementById('statusBar');
  if (msg) {
    bar.textContent = msg;
    bar.className = 'status-bar ' + (ok ? 'connected' : 'error');
  } else if (gistConfig.token && gistConfig.gistId) {
    bar.textContent = 'Gist nakonfigurován';
    bar.className = 'status-bar connected';
  } else if (gistConfig.token) {
    bar.textContent = 'Token zadán, Gist ID chybí';
    bar.className = 'status-bar';
  } else {
    bar.textContent = 'Offline mód — nastav Gist v ⚙';
    bar.className = 'status-bar';
  }
}

// =================== HISTORY ===================
function renderHistory() {
  const list = document.getElementById('historyList');
  if (entries.length === 0) {
    list.innerHTML = '<div class="empty-state"><div class="empty-icon">📋</div><p>Zatím žádné záznamy</p></div>';
    return;
  }

  list.innerHTML = [...entries].reverse().map(e => {
    const d = new Date(e.date + 'T12:00:00');
    const dateStr = d.toLocaleDateString('cs-CZ', { weekday: 'short', day: 'numeric', month: 'short' });
    const pills = [];
    if (e.dose) pills.push(`<span class="pill pill-dose">${e.dose}mg</span>`);
    if (e.initiation) pills.push(`<span class="pill ${pillClass(e.initiation)}">Init ${e.initiation}</span>`);
    if (e.focus) pills.push(`<span class="pill ${pillClass(e.focus)}">Focus ${e.focus}</span>`);
    if (e.emotionalReactivity) pills.push(`<span class="pill ${pillClass(e.emotionalReactivity)}">Emo ${e.emotionalReactivity}</span>`);
    if (e.heartRate) pills.push(`<span class="pill pill-dose">${e.heartRate}bpm</span>`);
    return `<div class="history-item" onclick="showDetail('${e.date}')">
      <div class="history-date">${dateStr}</div>
      <div class="history-pills">${pills.join('')}</div>
    </div>`;
  }).join('');
}

function pillClass(val) {
  if (val >= 4) return 'pill-good';
  if (val === 3) return 'pill-mid';
  return 'pill-bad';
}

function showDetail(date) {
  currentModalDate = date;
  const e = entries.find(x => x.date === date);
  if (!e) return;

  const d = new Date(date + 'T12:00:00');
  document.getElementById('modalTitle').textContent = d.toLocaleDateString('cs-CZ', { weekday: 'long', day: 'numeric', month: 'long' });

  const energyLabels = { low: '⬇ Low', ok: '→ OK', good: '⬆ Good', crash: '💥 Crash' };
  const sleepLabels = { easy: 'Lehké', normal: 'Normální', hard: 'Těžké' };
  const wakingLabels = { none: 'Ne', once: '1×', multiple: 'Víckrát' };
  const changeLabels = { better: '✓ Lepší', same: '= Stejný', worse: '✗ Horší' };

  let html = `<div style="display:grid; gap:8px;">`;
  html += `<div class="pill pill-dose" style="display:inline-block; width:fit-content;">${e.dose}mg v ${e.doseTime}</div>`;
  html += row('Iniciace', scaleBar(e.initiation));
  html += row('Focus', scaleBar(e.focus));
  html += row('Emoční reaktivita', scaleBar(e.emotionalReactivity));
  html += row('Hlad', e.hungerNoticed === 'yes' ? 'Ano' : 'Ne');
  html += row('První jídlo', e.firstMeal || '—');
  html += row('Tepová frekvence', e.heartRate ? `${e.heartRate} bpm` : '—');
  html += row('Tinnitus', changeLabels[e.tinnitus] || '—');
  html += row('RLS', changeLabels[e.rls] || '—');
  html += row('Energie', `${energyLabels[e.energyMorning]||'—'} → ${energyLabels[e.energyAfternoon]||'—'} → ${energyLabels[e.energyEvening]||'—'}`);
  html += row('Usínání', sleepLabels[e.sleepOnset] || '—');
  html += row('Noční probouzení', wakingLabels[e.nightWaking] || '—');
  if (e.note) html += row('Poznámka', e.note);
  html += `</div>`;

  document.getElementById('modalContent').innerHTML = html;
  document.getElementById('detailModal').classList.add('show');
}

function row(label, value) {
  return `<div style="display:flex; justify-content:space-between; padding:6px 0; border-bottom:1px solid var(--border);">
    <span style="color:var(--text-dim); font-size:13px;">${label}</span>
    <span style="font-size:13px; font-weight:500;">${value}</span>
  </div>`;
}

function scaleBar(val) {
  if (!val) return '—';
  const colors = ['', 'var(--bad)', 'var(--warn)', 'var(--text-dim)', 'var(--accent)', 'var(--good)'];
  return `<span style="color:${colors[val]}; font-family:'JetBrains Mono',monospace; font-weight:600;">${val}/5</span>`;
}

function closeModal() {
  document.getElementById('detailModal').classList.remove('show');
  currentModalDate = null;
}

function deleteEntry() {
  if (!currentModalDate) return;
  if (!confirm('Smazat tento záznam?')) return;
  entries = entries.filter(e => e.date !== currentModalDate);
  saveLocal();
  saveToGist();
  closeModal();
  renderHistory();
  checkTodayEntry();
  showToast('Smazáno');
}

// =================== CHARTS ===================
function renderCharts() {
  if (entries.length < 2) {
    document.getElementById('section-charts').innerHTML = '<div class="no-data">Potřeba alespoň 2 záznamy pro grafy</div>';
    return;
  }

  renderTrendChart();
  renderEnergyChart();
  renderDoseComparison();
  renderCorrelation();
}

function renderTrendChart() {
  const ctx = document.getElementById('trendChart');
  if (charts.trend) charts.trend.destroy();

  const recent = entries.slice(-14);
  const labels = recent.map(e => {
    const d = new Date(e.date + 'T12:00:00');
    return d.toLocaleDateString('cs-CZ', { day: 'numeric', month: 'numeric' });
  });

  charts.trend = new Chart(ctx, {
    type: 'line',
    data: {
      labels,
      datasets: [
        { label: 'Iniciace', data: recent.map(e => e.initiation), borderColor: '#6c8cff', backgroundColor: 'rgba(108,140,255,0.1)', tension: 0.3, fill: false },
        { label: 'Focus', data: recent.map(e => e.focus), borderColor: '#4ecb71', backgroundColor: 'rgba(78,203,113,0.1)', tension: 0.3, fill: false },
        { label: 'Emo. reaktivita', data: recent.map(e => e.emotionalReactivity), borderColor: '#f0a030', backgroundColor: 'rgba(240,160,48,0.1)', tension: 0.3, fill: false }
      ]
    },
    options: chartOptions(1, 5)
  });

  // Heart rate separate chart (different scale)
  if (recent.some(e => e.heartRate)) {
    let hrCanvas = document.getElementById('hrTrendChart');
    if (!hrCanvas) {
      const container = document.createElement('div');
      container.className = 'chart-container';
      container.innerHTML = '<div class="chart-title">Tepová frekvence</div><div class="chart-wrap"><canvas id="hrTrendChart"></canvas></div>';
      document.getElementById('trendChart').closest('.chart-container').after(container);
      hrCanvas = document.getElementById('hrTrendChart');
    }
    if (charts.hrTrend) charts.hrTrend.destroy();
    charts.hrTrend = new Chart(hrCanvas, {
      type: 'line',
      data: {
        labels,
        datasets: [
          { label: 'Tepová frekvence', data: recent.map(e => e.heartRate), borderColor: '#e05555', backgroundColor: 'rgba(224,85,85,0.1)', tension: 0.3, fill: true, pointRadius: 4 }
        ]
      },
      options: chartOptions(50, 120)
    });
  }
}

function renderEnergyChart() {
  const ctx = document.getElementById('energyChart');
  if (charts.energy) charts.energy.destroy();

  const energyMap = { low: 1, ok: 2, good: 3, crash: 0 };
  const recent = entries.slice(-14);
  const labels = recent.map(e => {
    const d = new Date(e.date + 'T12:00:00');
    return d.toLocaleDateString('cs-CZ', { day: 'numeric', month: 'numeric' });
  });

  charts.energy = new Chart(ctx, {
    type: 'bar',
    data: {
      labels,
      datasets: [
        { label: 'Ráno', data: recent.map(e => energyMap[e.energyMorning] ?? null), backgroundColor: 'rgba(108,140,255,0.6)' },
        { label: 'Odpoledne', data: recent.map(e => energyMap[e.energyAfternoon] ?? null), backgroundColor: 'rgba(78,203,113,0.6)' },
        { label: 'Večer', data: recent.map(e => energyMap[e.energyEvening] ?? null), backgroundColor: 'rgba(168,139,250,0.6)' }
      ]
    },
    options: {
      ...chartOptions(0, 3),
      scales: {
        ...chartOptions(0, 3).scales,
        y: {
          ...chartOptions(0, 3).scales.y,
          ticks: {
            ...chartOptions(0, 3).scales.y.ticks,
            callback: v => ['Crash', 'Low', 'OK', 'Good'][v] || ''
          }
        }
      }
    }
  });
}

function renderDoseComparison() {
  const container = document.getElementById('doseComparison');
  const ctx = document.getElementById('doseChart');
  if (charts.dose) charts.dose.destroy();

  const doses = [...new Set(entries.map(e => e.dose))].filter(d => d > 0).sort((a, b) => a - b);

  if (doses.length < 1) {
    container.innerHTML = '<div class="no-data">Zatím jen jedna dávka</div>';
    return;
  }

  const metrics = ['initiation', 'focus', 'emotionalReactivity'];
  const metricLabels = { initiation: 'Iniciace', focus: 'Focus', emotionalReactivity: 'Emo. reaktivita' };

  // Cards
  container.innerHTML = doses.map(dose => {
    const doseEntries = entries.filter(e => e.dose === dose);
    const avg = metrics.reduce((sum, m) => {
      const vals = doseEntries.map(e => e[m]).filter(v => v != null);
      return sum + (vals.length ? vals.reduce((a, b) => a + b, 0) / vals.length : 0);
    }, 0) / metrics.length;

    return `<div class="dose-card">
      <div class="dose-label">${dose}mg</div>
      <div class="dose-value">${avg.toFixed(1)}</div>
      <div class="dose-sub">Ø skóre (${doseEntries.length} dní)</div>
    </div>`;
  }).join('');

  // Grouped bar chart
  const colors = ['rgba(108,140,255,0.7)', 'rgba(78,203,113,0.7)', 'rgba(240,160,48,0.7)'];

  const datasets = metrics.map((m, i) => ({
    label: metricLabels[m],
    data: doses.map(dose => {
      const vals = entries.filter(e => e.dose === dose).map(e => e[m]).filter(v => v != null);
      return vals.length ? (vals.reduce((a, b) => a + b, 0) / vals.length) : null;
    }),
    backgroundColor: colors[i]
  }));

  charts.dose = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: doses.map(d => `${d}mg`),
      datasets
    },
    options: chartOptions(0, 5)
  });
}

function renderCorrelation() {
  const container = document.getElementById('corrMatrix');
  const metrics = ['initiation', 'focus', 'emotionalReactivity', 'dose', 'heartRate'];
  const labels = ['Init', 'Focus', 'Emo', 'Dávka', 'Tep'];

  const data = metrics.map(m => entries.map(e => e[m]).filter(v => v != null));

  // Only render if we have enough data
  if (data.some(d => d.length < 3)) {
    container.innerHTML = '<div class="no-data">Potřeba víc dat pro korelace</div>';
    return;
  }

  const n = metrics.length;
  const size = n + 1;

  let html = `<div class="corr-grid" style="grid-template-columns: 50px repeat(${n}, 1fr);">`;
  // Header row
  html += `<div></div>`;
  labels.forEach(l => html += `<div class="corr-label" style="justify-content:center;">${l}</div>`);

  for (let i = 0; i < n; i++) {
    html += `<div class="corr-label">${labels[i]}</div>`;
    for (let j = 0; j < n; j++) {
      if (i === j) {
        html += `<div class="corr-cell" style="background:var(--surface-3); color:var(--text-muted);">1.0</div>`;
      } else {
        const r = pearson(
          entries.map(e => e[metrics[i]]).filter(v => v != null),
          entries.map(e => e[metrics[j]]).filter(v => v != null)
        );
        const color = r > 0.3 ? `rgba(78,203,113,${Math.abs(r)})` :
                      r < -0.3 ? `rgba(224,85,85,${Math.abs(r)})` :
                      `rgba(136,136,160,${Math.max(0.1, Math.abs(r))})`;
        html += `<div class="corr-cell" style="background:${color};">${r.toFixed(1)}</div>`;
      }
    }
  }
  html += `</div>`;
  container.innerHTML = html;
}

function pearson(x, y) {
  const n = Math.min(x.length, y.length);
  if (n < 3) return 0;
  const ax = x.slice(0, n), ay = y.slice(0, n);
  const mx = ax.reduce((a, b) => a + b) / n;
  const my = ay.reduce((a, b) => a + b) / n;
  let num = 0, dx = 0, dy = 0;
  for (let i = 0; i < n; i++) {
    const xi = ax[i] - mx, yi = ay[i] - my;
    num += xi * yi;
    dx += xi * xi;
    dy += yi * yi;
  }
  const denom = Math.sqrt(dx * dy);
  return denom === 0 ? 0 : num / denom;
}

function chartOptions(min, max) {
  return {
    responsive: true,
    maintainAspectRatio: false,
    interaction: { mode: 'index', intersect: false },
    plugins: {
      legend: {
        position: 'bottom',
        labels: { color: '#8888a0', font: { family: 'DM Sans', size: 11 }, boxWidth: 12, padding: 12 }
      }
    },
    scales: {
      x: {
        ticks: { color: '#555568', font: { family: 'DM Sans', size: 10 } },
        grid: { color: 'rgba(42,42,58,0.5)' }
      },
      y: {
        min, max,
        ticks: { color: '#555568', font: { family: 'JetBrains Mono', size: 10 }, stepSize: 1 },
        grid: { color: 'rgba(42,42,58,0.5)' }
      }
    }
  };
}

// =================== EXPORT / IMPORT ===================
function exportJSON() {
  const blob = new Blob([JSON.stringify(entries, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `concerta-data-${getDateKey(new Date())}.json`;
  a.click();
}

function importJSON() {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = '.json';
  input.onchange = async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const text = await file.text();
    try {
      const imported = JSON.parse(text);
      if (Array.isArray(imported)) {
        // Merge
        const merged = {};
        entries.forEach(e => merged[e.date] = e);
        imported.forEach(e => merged[e.date] = e);
        entries = Object.values(merged).sort((a, b) => a.date.localeCompare(b.date));
        saveLocal();
        saveToGist();
        showToast(`Importováno ${imported.length} záznamů`);
      }
    } catch (err) {
      showToast('Chyba importu');
    }
  };
  input.click();
}

function clearData() {
  if (!confirm('Opravdu smazat všechna data?')) return;
  if (!confirm('Fakt úplně všechno?')) return;
  entries = [];
  saveLocal();
  saveToGist();
  checkTodayEntry();
  showToast('Data smazána');
}

// =================== UTILS ===================
function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2000);
}

// Init
init();
</script>
