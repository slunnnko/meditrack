<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Medication Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/layout.css">
<link rel="stylesheet" href="css/components.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
</head>
<body>

<div class="app">
  <!-- Header -->
  <div class="header">
    <h1 id="appTitle">◉ Medication Tracker</h1>
    <div class="header-actions">
      <button class="icon-btn" id="btnSync" title="Sync">⟳</button>
      <button class="icon-btn" id="btnSettings" title="Settings">⚙</button>
    </div>
  </div>

  <div id="statusBar" class="status-bar"></div>

  <!-- Navigation -->
  <nav class="nav">
    <button class="nav-btn active" data-sec="log">Záznam</button>
    <button class="nav-btn" data-sec="history">Historie</button>
    <button class="nav-btn" data-sec="charts">Grafy</button>
  </nav>

  <!-- Sections (populated by JS modules) -->
  <div id="section-log" class="section active"></div>

  <div id="section-history" class="section">
    <div id="historyList"></div>
  </div>

  <div id="section-charts" class="section">
    <div class="chart-container">
      <div class="chart-title">Trendy metrik</div>
      <div class="chart-wrap"><canvas id="chartTrend"></canvas></div>
    </div>
    <div class="chart-container" id="chartNumericWrap" style="display:none;">
      <div class="chart-title">Numerické metriky</div>
      <div class="chart-wrap"><canvas id="chartNumeric"></canvas></div>
    </div>
    <div class="chart-container" id="chartEnergyWrap">
      <div class="chart-title">Energie přes den</div>
      <div class="chart-wrap"><canvas id="chartEnergy"></canvas></div>
    </div>
    <div class="chart-container">
      <div class="chart-title">Porovnání dávek</div>
      <div id="doseCards" class="dose-compare"></div>
      <div style="height:12px"></div>
      <div class="chart-wrap"><canvas id="chartDose"></canvas></div>
    </div>
    <div class="chart-container">
      <div class="chart-title">Korelace metrik</div>
      <div id="corrMatrix"></div>
    </div>
  </div>

  <div id="section-settings" class="section"></div>
</div>

<!-- Detail modal -->
<div id="modal" class="modal-overlay">
  <div class="modal">
    <h3 id="modalTitle"></h3>
    <div id="modalBody"></div>
    <div class="modal-actions">
      <button class="btn-s" id="btnModalClose">Zavřít</button>
      <button class="btn-s" id="btnModalEdit">✏ Editovat</button>
      <button class="btn-d" id="btnModalDel">Smazat</button>
    </div>
  </div>
</div>

<!-- Drug selector overlay -->
<div id="drugSelectorOverlay" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.85); z-index:300; align-items:center; justify-content:center; overflow-y:auto;">
  <div style="width:100%; max-width:420px; padding:24px; margin:auto;">
    <div class="onboarding">
      <div class="onboarding-title">Vyber svůj lék</div>

      <!-- Search by drug name -->
      <div class="drug-search-wrap">
        <input type="search" id="drugSearchInput" placeholder="Hledat lék..." autocomplete="off">
        <div class="drug-search-results" id="drugSearchResults"></div>
      </div>

      <!-- Divider -->
      <div style="text-align:center;font-size:11px;color:var(--text-dim);text-transform:uppercase;letter-spacing:1.5px;padding:4px 0;">nebo hledat podle diagnózy</div>

      <!-- Search by condition -->
      <div class="drug-search-wrap">
        <input type="search" id="conditionSearchInput" placeholder="Hledat diagnózu..." autocomplete="off">
        <div class="drug-search-results" id="conditionSearchResults"></div>
      </div>

      <!-- Condition info panel (Wikipedia) -->
      <div id="conditionInfo" style="display:none; background:var(--bg-card); border:1px solid var(--border); border-radius:12px; overflow:hidden;"></div>

      <!-- Custom drug -->
      <div style="display:flex; gap:8px; align-items:center;">
        <select id="drugCategorySelect" style="flex:1; background:var(--bg-input); border:1px solid var(--border); border-radius:8px; color:var(--text-primary); font-family:var(--font-sans); font-size:13px; padding:10px; appearance:none;">
          <option value="generic">generic</option>
        </select>
        <button class="btn-s" id="btnCustomDrug">Vlastní lék</button>
      </div>
    </div>
  </div>
</div>

<div id="toast" class="toast"></div>

<script type="module" src="js/app.js"></script>
</body>
</html>
